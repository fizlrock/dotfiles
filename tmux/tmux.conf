# -----------------------------------------------------------------------------
# Базовые настройки, приближающие tmux к iTerm2
# -----------------------------------------------------------------------------

# Использовать 256 цветов
set -g default-terminal "screen-256color"

# Включить поддержку мыши (прокрутка, выбор панелей, изменение размера)
set -g mouse on

# Ускорить перерисовку при смене окон
set -g renumber-windows on

# -----------------------------------------------------------------------------
# Статус-строка (нижняя панель) – стилизация под iTerm2
# -----------------------------------------------------------------------------

# Цветовая схема (тёмная, похожая на iTerm2 по умолчанию)
set -g status-style fg=white,bg=black
set -g status-left-style fg=black,bg=green
set -g status-right-style fg=black,bg=green

# Левая часть: сессия и окна
set -g status-left "#[fg=black,bg=green] #S #[fg=green,bg=black]"
set -g status-left-length 40

# Правая часть: дата, время, заряд батареи (только macOS)
# Если вы не на macOS, замените на другую команду или уберите
set -g status-right "#[fg=black,bg=green] %H:%M #[fg=green,bg=black]#[fg=black,bg=green] %d.%m.%Y "
set -g status-right-length 100

# Оформление списка окон
set -g window-status-format " #I: #W "
set -g window-status-current-format "#[fg=black,bg=green] #I: #W #[fg=green,bg=black]"

# Отключить подтверждение при переименовании окон
set -g allow-rename off

# -----------------------------------------------------------------------------
# Горячие клавиши (префикс – Ctrl+B, но можно изменить на Ctrl+A)
# -----------------------------------------------------------------------------

# Сменить префикс на Ctrl+A (как в screen, многие предпочитают)
set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# Разделение панелей (без префикса, но с Shift+Alt – требует настройки терминала)
# Более привычные iTerm2 комбинации с префиксом:
bind | split-window -h   # префикс + | (вертикальное разделение)
bind - split-window -v   # префикс + - (горизонтальное разделение)

# Навигация между панелями как в iTerm2 (Alt+стрелки)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Изменение размера панелей (Shift+Alt+стрелки)
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Down resize-pane -D 5

# -----------------------------------------------------------------------------
# Копирование и буфер обмена (как в iTerm2)
# -----------------------------------------------------------------------------

# Режим копирования (используем vi-подобные клавиши)
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Копирование в системный буфер обмена (на macOS через reattach-to-user-namespace)
# Для Linux раскомментируйте соответствующую строку
# TODO check this block
# if-shell "command -v reattach-to-user-namespace >/dev/null 2>&1" {
#     bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
#     bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
# } else {
#     bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
#     bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
# }

# Вставка из системного буфера обмена
bind C-p run "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"   # Ctrl+P вставляет

# -----------------------------------------------------------------------------
# Дополнительные улучшения
# -----------------------------------------------------------------------------

# Обновление статуса каждую секунду (для часов)
set -g status-interval 1

# Отображение номера окна всегда
set -g display-panes-time 1500

# Звук/визуальное оповещение
set -g visual-bell on
set -g bell-action any

# Автоматически переименовывать окна по запущенной программе
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"
